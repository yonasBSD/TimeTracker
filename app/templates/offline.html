<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <title>Offline — TimeTracker</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(160deg, #4F46E5 0%, #312e81 100%);
            color: #fff;
            text-align: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 24rem;
        }
        .logo {
            width: 4rem;
            height: 4rem;
            margin: 0 auto 1.25rem;
            display: block;
        }
        p {
            margin: 0;
            font-size: 1.05rem;
            line-height: 1.55;
            font-weight: 500;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="/static/images/timetracker-logo-icon.svg" alt="" width="64" height="64">
        <p>You&rsquo;re offline &mdash; your timer is still running on the server.</p>
    </div>
</body>
</html>
